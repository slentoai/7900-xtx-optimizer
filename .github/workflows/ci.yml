name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: python -m pip install .

      - name: Run detection
        run: rdna3-opt detect

      - name: Print environment policy
        run: rdna3-opt env

      - name: Dry-run demo launch
        run: rdna3-opt launch --dry-run -- python -m rdna3_optimization_layer.demo_app

      - name: Run demo app through wrapper
        run: rdna3-opt launch -- python -m rdna3_optimization_layer.demo_app
